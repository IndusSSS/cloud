# Traefik static configuration
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false

certificatesResolvers:
  le:
    acme:
      email: contact@smartsecurity.solutions
      storage: acme.json
      httpChallenge:
        entryPoint: web
