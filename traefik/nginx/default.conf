server {
  listen 80;
  server_name cloud.smartsecurity.solutions;

  # Only route upload.php through PHP
  location = /upload.php {
    include fastcgi_params;
    fastcgi_pass php-fpm:9000;
    fastcgi_param SCRIPT_FILENAME /var/www/html/upload.php;
  }

  # Deny access to anything else in this folder
  location / {
    return 404;
  }
}
