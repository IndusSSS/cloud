services:
  # ────────────────────── Reverse-proxy ─────────────────────
  traefik:
    image: traefik:v2.10
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=admin@smartsecurity.solutions"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--api.dashboard=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./traefik/traefik_dynamic.yml:/etc/traefik/traefik_dynamic.yml:ro"
      - "./traefik/htpasswd:/etc/traefik/htpasswd:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - web

  # ────────────────────── Core services ─────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smart
      POSTGRES_DB: smartsecurity
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks:
      - internal

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - internal

  # ────────────────── API micro-services (stubs) ─────────────
  gateway:
    build: ./services/gateway
    env_file: ./services/gateway/env.example
    depends_on:
      - auth
      - device
      - metrics
    networks:
      - internal
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gateway.rule=Host(`api.smartsecurity.solutions`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"

  auth:
    build: ./services/auth-api
    env_file: ./services/auth-api/env.example
    networks: [internal]
    depends_on:
      - postgres
      - redis

  device:
    build: ./services/device-api
    env_file: ./services/device-api/env.example
    depends_on:
      - postgres
    networks:
      - internal

  metrics:
    build: ./services/metrics-api
    env_file: ./services/metrics-api/env.example
    depends_on:
      - postgres
      - redis
    networks:
      - internal

# ────────────────────────── Networks & vols ─────────────────────────
networks:
  web: {}                 # exposed to Traefik
  internal:
    internal: true

volumes:
  pgdata:
  redisdata:
  miniodata:
  letsencrypt:
