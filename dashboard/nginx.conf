# dashboard/nginx.conf

server {
    listen 80;
    server_name admin.smartsecurity.solutions;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
