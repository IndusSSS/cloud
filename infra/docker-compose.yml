
######################################################################
# Networks
######################################################################
networks:
  web:
    name: smart_web
    driver: bridge

######################################################################
# Volumes
######################################################################
volumes:
  db_data:
  mosquitto_data:
  mosquitto_log:

######################################################################
# Services
######################################################################
services:
  ####################################################################
  # 0) Traefik reverse-proxy / ACME
  ####################################################################
  traefik:
    image: traefik:v2.11
    restart: unless-stopped
    command:
      # ----- providers ------------------------------------------------
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      # ----- entry-points & redirect ----------------------------------
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # ----- ACME / Let's Encrypt -------------------------------------
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.email=contact@smartsecurity.solutions"
      - "--certificatesresolvers.le.acme.storage=/acme.json"
      # ----- dashboard -------------------------------------------------
      - "--api.dashboard=true"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"                # Traefik dashboard on :8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/acme.json:/acme.json
      - ./traefik/dynamic:/etc/traefik/dynamic:ro   # <-- spa-fallback.yml lives here
    networks: [web]

  ####################################################################
  # 1) PostgreSQL 15
  ####################################################################
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:  smartuser
      POSTGRES_PASSWORD: usersecret
      POSTGRES_DB: smartdb
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [web]

  ####################################################################
  # 2) Public IoT REST API (FastAPI, asyncpg not required)
  ####################################################################
  api:
    build: ./services/api
    restart: unless-stopped
    env_file: .env
    depends_on: [db]
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/v1/health').getcode()==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.smartsecurity.solutions`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks: [web]

  ####################################################################
  # 3) Auth-API (FastAPI async, JWT / refresh tokens)
  ####################################################################
  auth-api:
    build: ./services/auth-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://smartuser:supersecret@db:5432/smartdb"
    depends_on: [db]
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.smartsecurity.solutions`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=le"
      - "traefik.http.services.auth.loadbalancer.server.port=8000"
    networks: [web]

  ####################################################################
  # 4) MQTT broker (Eclipse Mosquitto 2)
  ####################################################################
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - ./mosquitto/config:/mosquitto/config:ro
    networks: [web]

  ####################################################################
  # 5) Bridge service (MQTT → WebSocket fan-out, Python)
  ####################################################################
  bridge:
    build: ./services/bridge
    restart: unless-stopped
    env_file: .env
    depends_on: [mqtt]
    networks: [web]

  ####################################################################
  # 6) Public WebSocket gateway (FastAPI / Uvicorn)
  ####################################################################
  ws:
    build: ./services/ws
    restart: unless-stopped
    env_file: .env
    depends_on: [api]
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ws.rule=Host(`ws.smartsecurity.solutions`)"
      - "traefik.http.routers.ws.entrypoints=websecure"
      - "traefik.http.routers.ws.tls.certresolver=le"
      - "traefik.http.services.ws.loadbalancer.server.port=8000"
    networks: [web]

  ####################################################################
  # 7) PHP-FPM backend for upload.php  (+Nginx side-car)
  ####################################################################
  php-fpm:
    build: ./services/backend
    restart: unless-stopped
    networks: [web]

  nginx-upload:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [php-fpm]
    volumes:
      - ./services/backend/public:/var/www/html:ro
      - ./services/backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.upload.rule=Host(`upload.smartsecurity.solutions`)"
      - "traefik.http.routers.upload.entrypoints=websecure"
      - "traefik.http.routers.upload.tls.certresolver=le"
      - "traefik.http.services.upload.loadbalancer.server.port=80"
    networks: [web]

  ####################################################################
  # 8) Dashboard SPA (Nginx serving /dist)
  ####################################################################
  dashboard:
    build:
      context: ../dashboard            # repo-root/dashboard/Dockerfile
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`admin.smartsecurity.solutions`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      # SPA fallback → middleware defined in traefik/dynamic/spa-fallback.yml
      - "traefik.http.routers.dashboard.middlewares=spa-fallback@file"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
    networks: [web]

  ####################################################################
  # 9) MinIO – S3-compatible object storage
  ####################################################################
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:      smartminio
      MINIO_ROOT_PASSWORD:  changeThisMinioRootPass
    volumes:
      - ./minio/data:/data
    expose:
      - "9000"      # S3 API
      - "9001"      # Web console
    labels:
      # ---------- S3 API, main host ----------
      - "traefik.enable=true"
      - "traefik.http.routers.storage.rule=Host(`storage.smartsecurity.solutions`)"
      - "traefik.http.routers.storage.entrypoints=websecure"
      - "traefik.http.routers.storage.tls.certresolver=le"
      - "traefik.http.services.storage.loadbalancer.server.port=9000"

      # ---------- OPTIONAL: separate host for web console ----------
      - "traefik.http.routers.storage-console.rule=Host(`console.smartsecurity.solutions`)"
      - "traefik.http.routers.storage-console.entrypoints=websecure"
      - "traefik.http.routers.storage-console.tls.certresolver=le"
      - "traefik.http.services.storage-console.loadbalancer.server.port=9001"
    networks: [web]
