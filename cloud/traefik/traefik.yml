# ─────────────────────────────────────────────────────────────────────────────
# Static configuration for Traefik v2.9+
# ─────────────────────────────────────────────────────────────────────────────

# 1) Define the ports Traefik listens on:
entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"
  traefik:
    address: ":8080"          # Traefik dashboard & REST API

# 2) Enable the built-in dashboard + API on the `traefik` entryPoint:
api:
  dashboard: true             # UI at http://<host>:8080/dashboard/
  insecure: true              # allow unauthenticated access on :8080

# 3) Where to store/acquire certificates:
certificatesResolvers:
  le:                         # “le” is our ACME (Let's Encrypt) resolver
    acme:
      email: contact@smartsecurity.solutions
      storage: acme.json
      httpChallenge:
        entryPoint: web      # perform HTTP-01 challenge on port 80

# 4) Enable Docker provider; only pick up containers on the “web” network
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false   # only containers you explicitly label will be published
    network: web

# 5) (Optional) Traefik logs & metrics
log:
  level: INFO

metrics:
  prometheus: {}             # enable Prometheus metrics on :8080/metrics
